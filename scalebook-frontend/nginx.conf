# scalebook-frontend/nginx.conf

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # This is the critical part for React Router:
    # When someone visits /dashboard directly (or refreshes the page),
    # Nginx looks for a file called /dashboard — which doesn't exist
    # (there's only index.html). Without this line, Nginx returns 404.
    # With this line, Nginx always serves index.html and lets
    # React Router handle the URL client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    # Any request starting with /api gets forwarded to the backend container
    # This avoids CORS issues — the browser thinks frontend and backend
    # are on the same origin (both port 80)
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}